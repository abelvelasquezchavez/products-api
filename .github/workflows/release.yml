name: Release

# Creates a GitHub Release whenever a semver tag (e.g. v1.0.0) is pushed.
# Release notes are generated automatically from the commits/PRs since the
# previous tag.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
